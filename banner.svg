<svg viewBox="0 0 900 250" width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background-color: #121212;">
  <style>
    .label {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: #777;
    }
    .sublabel {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-size: 12px;
      fill: #777;
    }
    .wire {
      stroke-linecap: round;
      stroke-width: 4;
    }
    .tiny {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-size: 10px;
      fill: #9aa0a6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>

  <defs>
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4285F4" opacity="0.15" />
    </pattern>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F02222" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F02222" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <line x1="300" y1="20" x2="300" y2="230" stroke="#333" stroke-dasharray="4,4" />
  <line x1="600" y1="20" x2="600" y2="230" stroke="#333" stroke-dasharray="4,4" />

  <text x="150" y="210" class="label" text-anchor="middle">Capture</text>
  <text x="150" y="230" class="sublabel" text-anchor="middle">Events &amp; Scoped State</text>

  <text x="450" y="210" class="label" text-anchor="middle">Persist</text>
  <text x="450" y="230" class="sublabel" text-anchor="middle">Spanner Session Model</text>

  <text x="750" y="210" class="label" text-anchor="middle">Resume</text>
  <text x="750" y="230" class="sublabel" text-anchor="middle">Unified ADK Session View</text>

  <g transform="translate(78, 48)">
    <text x="12" y="-4" class="tiny">app</text>
    <text x="74" y="-4" class="tiny">user</text>
    <text x="137" y="-4" class="tiny">session</text>

    <rect x="0" y="12" width="44" height="60" rx="8" fill="none" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.32" />
    <rect x="62" y="12" width="44" height="60" rx="8" fill="none" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.32" />
    <rect x="124" y="12" width="44" height="60" rx="8" fill="none" stroke="#F02222" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.32" />

    <line x1="10" y1="28" x2="34" y2="28" stroke="#4285F4" class="wire" opacity="0.75" />
    <line x1="10" y1="42" x2="28" y2="42" stroke="#4285F4" class="wire" opacity="0.4" />
    <line x1="10" y1="56" x2="30" y2="56" stroke="#4285F4" class="wire" opacity="0.6" />

    <line x1="72" y1="28" x2="96" y2="28" stroke="#4285F4" class="wire" opacity="0.75" />
    <line x1="72" y1="42" x2="90" y2="42" stroke="#4285F4" class="wire" opacity="0.4" />
    <line x1="72" y1="56" x2="92" y2="56" stroke="#4285F4" class="wire" opacity="0.6" />

    <line x1="134" y1="28" x2="158" y2="28" stroke="#F02222" class="wire" opacity="0.75" />
    <line x1="134" y1="42" x2="152" y2="42" stroke="#F02222" class="wire" opacity="0.45" />
    <line x1="134" y1="56" x2="154" y2="56" stroke="#F02222" class="wire" opacity="0.65" />

    <path d="M 188,22 C 188,37 173,42 163,42 C 173,42 188,47 188,62 C 188,47 203,42 213,42 C 203,42 188,37 188,22 Z" fill="#F02222" opacity="0.85">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.8s" repeatCount="indefinite" />
    </path>
    <path d="M 205,54 C 205,61 197,64 192,64 C 197,64 205,67 205,74 C 205,67 213,64 218,64 C 213,64 205,61 205,54 Z" fill="#4285F4" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.9s" repeatCount="indefinite" />
    </path>

    <path d="M 18,92 C 46,82 70,82 98,92 S 150,102 176,92" fill="none" stroke="#666" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5" />
    <circle cx="30" cy="92" r="3" fill="#fff" opacity="0.85">
      <animateMotion dur="4.8s" repeatCount="indefinite">
        <mpath href="#leftPath"/>
      </animateMotion>
    </circle>
  </g>

  <path id="leftPath" d="M 108,140 C 136,130 160,130 188,140 S 240,150 266,140" fill="none" stroke="none" />

  <g transform="translate(450, 98)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.38">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite" />
    </circle>

    <circle cx="0" cy="0" r="42" fill="none" stroke="#fff" stroke-width="1" opacity="0.12" />
    <circle cx="0" cy="0" r="18" fill="#4285F4" opacity="0.18" />
    <circle cx="0" cy="0" r="5" fill="#4285F4" />

    <circle cx="42" cy="0" r="4" fill="#F02222" />
    <circle cx="-21" cy="36" r="3" fill="#4285F4" />
    <circle cx="-20" cy="-35" r="2.5" fill="#fff" opacity="0.9" />

    <path d="M 0,0 L 0,-26" fill="none" stroke="#4285F4" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 0,0 L 18,0" fill="none" stroke="#F02222" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </path>

    <rect x="-96" y="-16" width="52" height="16" rx="8" fill="#4285F4" opacity="0.16" />
    <rect x="-96" y="8" width="66" height="16" rx="8" fill="#4285F4" opacity="0.12" />
    <rect x="30" y="-16" width="66" height="16" rx="8" fill="#F02222" opacity="0.12" />
    <rect x="44" y="8" width="52" height="16" rx="8" fill="#F02222" opacity="0.16" />
  </g>

  <g transform="translate(748, 98)">
    <circle cx="0" cy="0" r="10" fill="url(#glowBlue)">
      <animate attributeName="r" values="10;56" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="10" fill="url(#glowRed)">
      <animate attributeName="r" values="10;56" dur="2.2s" begin="1.1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0" dur="2.2s" begin="1.1s" repeatCount="indefinite" />
    </circle>

    <rect x="-46" y="-48" width="92" height="96" rx="14" fill="none" stroke="#4285F4" stroke-width="1.5" opacity="0.36" />
    <rect x="-28" y="-24" width="56" height="14" rx="7" fill="#4285F4" opacity="0.2" />
    <rect x="-28" y="-2" width="44" height="14" rx="7" fill="#4285F4" opacity="0.14" />
    <rect x="-28" y="20" width="52" height="14" rx="7" fill="#F02222" opacity="0.16" />

    <path d="M -74,-26 L -48,-10 M -74,26 L -48,10 M 74,-26 L 48,-10 M 74,26 L 48,10" fill="none" stroke="#4285F4" stroke-width="1.5" opacity="0.5" stroke-dasharray="2 2" />
    <circle cx="-74" cy="-26" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="-74" cy="26" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="74" cy="-26" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="74" cy="26" r="2" fill="#fff" opacity="0.5"/>
  </g>

  <path id="flightPath" d="M 0,100 C 150,100 200,60 300,100 S 400,100 450,100 S 500,140 600,100 S 700,100 900,100" fill="none" stroke="#4285F4" stroke-width="1" opacity="0.2" />

  <circle r="4" fill="#fff">
    <animate attributeName="fill"
             values="#ccc;#ccc;#4285F4;#4285F4;#F02222;#F02222"
             keyTimes="0;0.333;0.334;0.666;0.667;1"
             dur="7s"
             repeatCount="indefinite" />
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#flightPath"/>
    </animateMotion>
  </circle>
</svg>
